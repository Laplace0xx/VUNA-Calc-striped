

services:
  vuna-calculator:
    image: ${DOCKERHUB_USERNAME:-your-dockerhub-username}/vuna-calculator:latest
    build: .
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s